<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Біометричний вхід | FaceID</title>
    {% load static %}
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --card: #ffffff; --success: #10b981; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 2rem; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; position: relative; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: linear-gradient(90deg, var(--primary), #818cf8); border-radius: 24px 24px 0 0; }
        .camera-container { position: relative; width: 100%; aspect-ratio: 4/3; background: #eee; border-radius: 16px; overflow: hidden; margin: 1.5rem 0; border: 2px solid #e2e8f0; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .instr-badge { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.85); color: white; padding: 10px 25px; border-radius: 30px; font-weight: 600; font-size: 1rem; z-index: 10; white-space: nowrap; transition: 0.3s; }
        .hint-arrow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 4rem; opacity: 0; transition: 0.3s; z-index: 5; pointer-events: none; }
        .hint-arrow.visible { opacity: 0.7; animation: pulse 1s infinite; }
        .step-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .dot { width: 30px; height: 6px; background: #e2e8f0; border-radius: 10px; transition: 0.3s; }
        .dot.active { background: var(--primary); }
        .dot.done { background: var(--success); }
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(5px); }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { scale: 1; } 50% { scale: 1.2; } 100% { scale: 1; } }
        .hidden { display: none !important; }
        #otp-section { position: relative; z-index: 200; }
    </style>
</head>
<body>

<div id="loader" class="loader-overlay"><div class="spinner"></div><p style="font-weight: 700; color: var(--primary); margin-top: 15px;">ОБРОБКА ДАНИХ...</p></div>

<div class="card" id="liveness-ui">
    <a href="{% url 'user_list' %}" style="text-decoration: none; color: #64748b; font-size: 0.8rem; float: left;">← Назад</a>
    <h2 style="margin-top: 25px;">Вхід: <span style="color: var(--primary);">{{ user.username }}</span></h2>
    
    <div class="step-dots" id="dots-container">
        </div>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="overlay"></canvas>
        <div id="arrow" class="hint-arrow">⬅️</div>
        <div id="instr" class="instr-badge">Впишіть обличчя в овал</div>
    </div>
    <p style="color: #64748b; font-size: 0.85rem;">Система випадковим чином перевіряє вашу присутність</p>
</div>

<div class="card hidden" id="otp-section">
    <h2 style="color: var(--error);">2FA Перевірка</h2>
    <p style="color: #64748b;">Біометрія не пройшла. Введіть OTP код:</p>
    <form onsubmit="verifyOTP(event)">
        <input type="text" id="otp-code" style="width: 200px; font-size: 2rem; letter-spacing: 8px; text-align: center; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px;" placeholder="000000" maxlength="6">
        <button type="submit" style="width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; margin-top: 20px; font-weight: 700; cursor: pointer;">ПІДТВЕРДИТИ</button>
    </form>
</div>

<script>
    const video  = document.getElementById('video');
    const canvas = document.getElementById('overlay');
    const ctx    = canvas.getContext('2d');
    const instr  = document.getElementById('instr');
    const arrow  = document.getElementById('arrow');

    // ── Стан машини ──────────────────────────────────────────────────────────
    let currentStepIndex = 0;

    // Три фази після завершення всіх завдань:
    //   'tasks'    — виконуємо завдання
    //   'return'   — чекаємо повернення голови в центр
    //   'stable'   — відраховуємо стабільні кадри в центрі
    //   'done'     — фото знято, чекаємо відповідь сервера
    let phase = 'tasks';

    // Лічильник кадрів коли ніс стабільно в центрі
    let centerFrames = 0;
    const CENTER_FRAMES_NEEDED = 8;   // ~0.27с при 30fps — достатньо щоб рух зупинився
    const CENTER_ZONE = 0.10;         // nose.x в межах 0.5 ± 0.10 = центр

    // ── Пул завдань ───────────────────────────────────────────────────────────
    const taskPool = [
        { id: 'blink', text: "Кліпніть очима" },
        { id: 'left',  text: "Поверніть голову ліворуч" },
        { id: 'right', text: "Поверніть голову праворуч" }
    ];

    let taskQueue = [{ id: 'align', text: "Впишіть обличчя в овал" }];
    const shuffled = [...taskPool].sort(() => 0.5 - Math.random()).slice(0, 2);
    taskQueue = taskQueue.concat(shuffled);

    // Перевіряємо чи остання задача — поворот голови
    // (для blink центрування не потрібне — голова і так прямо)
    function lastTaskIsHeadTurn() {
        const last = taskQueue[taskQueue.length - 1];
        return last.id === 'left' || last.id === 'right';
    }

    // ── Dots ──────────────────────────────────────────────────────────────────
    const dotsContainer = document.getElementById('dots-container');
    taskQueue.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.id = `d${i}`;
        dot.className = i === 0 ? 'dot active' : 'dot';
        dotsContainer.appendChild(dot);
    });

    // ── FaceMesh ──────────────────────────────────────────────────────────────
    const faceMesh = new FaceMesh({
        locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
    });
    faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true,
        minDetectionConfidence: 0.7
    });

    faceMesh.onResults(results => {
        // ── Малюємо овальну маску ─────────────────────────────────────────────
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "rgba(248, 250, 252, 0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.ellipse(canvas.width / 2, canvas.height / 2, 110, 150, 0, 0, 2 * Math.PI);
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';

        // Колір овалу залежить від фази
        if (phase === 'stable') {
            // Зелений з прогресом — показуємо що рахуємо
            const progress = centerFrames / CENTER_FRAMES_NEEDED;
            ctx.strokeStyle = `hsl(${Math.round(240 + progress * 120)}, 80%, 50%)`;
        } else if (phase === 'done') {
            ctx.strokeStyle = "#10b981";
        } else {
            ctx.strokeStyle = "#4f46e5";
        }
        ctx.lineWidth = 4;
        ctx.stroke();

        // Якщо фото вже знято або немає landmarks — нічого далі не робимо
        if (phase === 'done' || !results.multiFaceLandmarks?.[0]) return;

        const landmarks = results.multiFaceLandmarks[0];
        const nose = landmarks[1];
        const eyeGap = landmarks[159].y - landmarks[145].y;
        const noseX  = nose.x;  // 0 = лівий край відео, 1 = правий (відео дзеркальне)

        // ── ФАЗА 1: виконуємо завдання ────────────────────────────────────────
        if (phase === 'tasks') {
            const task = taskQueue[currentStepIndex];
            let success = false;

            if (task.id === 'align') {
                if (Math.abs(noseX - 0.5) < 0.08) success = true;

            } else if (task.id === 'blink') {
                if (Math.abs(eyeGap) < 0.012) success = true;

            } else if (task.id === 'left') {
                arrow.innerText = "⬅️";
                arrow.classList.add('visible');
                // Дзеркальне відео: ніс іде вправо (x > 0.65) = голова ліворуч
                if (noseX > 0.65) success = true;

            } else if (task.id === 'right') {
                arrow.innerText = "➡️";
                arrow.classList.add('visible');
                if (noseX < 0.35) success = true;
            }

            if (success) {
                document.getElementById(`d${currentStepIndex}`).className = 'dot done';
                currentStepIndex++;
                arrow.classList.remove('visible');

                if (currentStepIndex < taskQueue.length) {
                    // Є ще завдання — переходимо до наступного
                    document.getElementById(`d${currentStepIndex}`).className = 'dot active';
                    instr.innerText = taskQueue[currentStepIndex].text;

                } else {
                    // Всі завдання виконані
                    const lastTask = taskQueue[taskQueue.length - 1];
                    const needsReturn = lastTask.id === 'left' || lastTask.id === 'right';

                    if (needsReturn) {
                        // Після повороту — чекаємо повернення в центр
                        phase = 'return';
                        centerFrames = 0;
                        instr.innerText = "Поверніть голову прямо...";
                    } else {
                        // Після кліпання — голова і так прямо, одразу рахуємо стабільність
                        phase = 'stable';
                        centerFrames = 0;
                        instr.innerText = "Не рухайтесь...";
                    }
                }
            }
            return;
        }

        // ── ФАЗА 2: чекаємо повернення в центр ───────────────────────────────
        // (тільки якщо остання дія була поворот)
        if (phase === 'return') {
            const inCenter = Math.abs(noseX - 0.5) < CENTER_ZONE;
            if (inCenter) {
                // Голова повернулась — тепер рахуємо стабільні кадри
                phase = 'stable';
                centerFrames = 1;
                instr.innerText = "Не рухайтесь...";
            }
            return;
        }

        // ── ФАЗА 3: відраховуємо стабільні кадри в центрі ────────────────────
        if (phase === 'stable') {
            const inCenter = Math.abs(noseX - 0.5) < CENTER_ZONE;

            if (inCenter) {
                centerFrames++;

                // Показуємо зворотний відлік
                const remaining = CENTER_FRAMES_NEEDED - centerFrames;
                if (remaining > 0) {
                    instr.innerText = `Стоп... (${remaining})`;
                }

                if (centerFrames >= CENTER_FRAMES_NEEDED) {
                    // Голова стабільно в центрі — ЗНІМАЄМО ФОТО
                    phase = 'done';
                    instr.innerText = "ГОТОВО! ПЕРЕВІРКА...";
                    captureAndVerify();
                }
            } else {
                // Голова знову рухнулась — скидаємо лічильник
                centerFrames = 0;
                instr.innerText = "Не рухайтесь...";
            }
            return;
        }
    });

    // ── Знімаємо фото і відправляємо на сервер ────────────────────────────────
    function captureAndVerify() {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width  = video.videoWidth;
        tempCanvas.height = video.videoHeight;
        tempCanvas.getContext('2d').drawImage(video, 0, 0);

        const imageData = tempCanvas.toDataURL('image/jpeg', 0.95);
        autoVerify(imageData);
    }

    async function autoVerify(imageData) {
        const loader = document.getElementById('loader');
        loader.style.display = 'flex';

        const fd = new FormData();
        fd.append('username',   '{{ user.username }}');
        fd.append('image_data', imageData);

        try {
            const res  = await fetch("{% url 'login_face_verify' %}", {
                method:  'POST',
                body:    fd,
                headers: { 'X-CSRFToken': '{{ csrf_token }}' }
            });
            const data = await res.json();
            loader.style.display = 'none';

            if (data.success) {
                window.location.href = `/login/success/{{ user.username }}/`;

            } else if (data.error === "too_many_attempts") {
                alert("FaceID заблоковано. Перехід на OTP.");
                document.getElementById('liveness-ui').classList.add('hidden');
                document.getElementById('otp-section').classList.remove('hidden');

            } else {
                alert(data.message);
                resetLiveness();
            }
        } catch {
            loader.style.display = 'none';
            alert("Сталася помилка зв'язку з сервером.");
            resetLiveness();
        }
    }

    // ── Скидання стану для нової спроби ──────────────────────────────────────
    function resetLiveness() {
        currentStepIndex = 0;
        phase            = 'tasks';
        centerFrames     = 0;
        arrow.classList.remove('visible');
        taskQueue.forEach((_, i) => {
            document.getElementById(`d${i}`).className = i === 0 ? 'dot active' : 'dot';
        });
        instr.innerText = taskQueue[0].text;
    }

    // ── OTP резервний вхід ────────────────────────────────────────────────────
    async function verifyOTP(e) {
        e.preventDefault();
        const fd = new FormData();
        fd.append('username', '{{ user.username }}');
        fd.append('otp_code', document.getElementById('otp-code').value);
        const res  = await fetch("{% url 'login_otp_verify' %}", {
            method:  'POST',
            body:    fd,
            headers: { 'X-CSRFToken': '{{ csrf_token }}' }
        });
        const data = await res.json();
        if (data.success) window.location.href = "/login/success/{{ user.username }}/";
        else alert(data.error);
    }

    // ── Запуск камери ─────────────────────────────────────────────────────────
    navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } }).then(s => {
        video.srcObject = s;
        new Camera(video, {
            onFrame: async () => { await faceMesh.send({ image: video }); },
            width: 640, height: 480
        }).start();
    });
</script>
</body>
</html>
