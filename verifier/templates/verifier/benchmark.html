<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accuracy Benchmark | Khrystyna Shmyhelska Thesis</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --card-bg: #ffffff;
            --terminal-bg: #0f172a;
            --success-color: #22c55e;
            --error-color: #ef4444;
            --warning-color: #eab308;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #0f172a;
            font-weight: 800;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 35px;
            font-size: 1rem;
            border-left: 4px solid var(--primary-color);
            padding-left: 15px;
        }

        /* Панель керування */
        .controls-card {
            background: #f1f5f9;
            padding: 25px;
            border-radius: 12px;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #475569;
        }

        input[type="number"], select {
            padding: 12px;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            background: white;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn-start {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-start:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        /* Прогрес-бар */
        .progress-section { margin-bottom: 30px; }
        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .progress-track {
            background: #e2e8f0;
            height: 14px;
            border-radius: 20px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #60a5fa);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Термінал результатів */
        .terminal-header {
            background: #1e293b;
            padding: 10px 15px;
            border-radius: 10px 10px 0 0;
            display: flex;
            gap: 6px;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        .terminal {
            background: var(--terminal-bg);
            color: #e2e8f0;
            padding: 20px;
            border-radius: 0 0 12px 12px;
            font-family: 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.85rem;
            height: 320px;
            overflow-y: auto;
            line-height: 1.6;
            border: 1px solid #1e293b;
        }

        .terminal b { color: #38bdf8; }
        .res-true { color: var(--success-color); font-weight: bold; }
        .res-false { color: var(--error-color); font-weight: bold; }
        .res-noisy { color: var(--warning-color); }

        /* Картка фінального результату */
        .result-card {
            margin-top: 30px;
            text-align: center;
            padding: 25px;
            border-radius: 15px;
            border: 2px dashed #e2e8f0;
            background: #fdfdfd;
        }

        #final-accuracy {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary-color);
            display: block;
            margin-bottom: 5px;
        }

        #skipped-info {
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

<audio id="finish-sound" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <h1>Метрики якості системи</h1>
    <div class="subtitle">
        Дослідження: Стійкість ArcFace + RetinaFace до оклюзій на датасетах AFDB та MFR2 <br>
        Магістерська робота: <b>Віталій Ковальковський</b>
    </div>

    <div class="controls-card">
        <div class="input-group">
            <label for="dataset">Датасет:</label>
            <select id="dataset">
                <option value="afdb">AFDB (Kaggle)</option>
                <option value="mfr2" selected>MFR2 (Локальний)</option>
            </select>
        </div>
        <div class="input-group">
            <label for="test-limit">Вибірка (осіб):</label>
            <input type="number" id="test-limit" value="" min="1" max="500">
        </div>
        <div class="input-group">
            <label for="threshold">Поріг ($Threshold$):</label>
            <input type="number" id="threshold" value="0.75" step="0.01" min="0.1" max="1.0">
        </div>
        <button class="btn-start" onclick="startBenchmark()">Запустити аналіз</button>
    </div>

    <div class="progress-section">
        <div class="progress-info">
            <span>Статус опрацювання</span>
            <span id="progress-percent">0%</span>
        </div>
        <div class="progress-track">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div class="terminal-header">
        <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
    </div>
    <div id="status-log" class="terminal">Готовність до ініціалізації експерименту...</div>
    
    <div class="result-card">
        <span id="final-accuracy"></span>
        <span id="skipped-info"></span>
    </div>
</div>

<script>
    function startBenchmark() {
        const dataset = document.getElementById('dataset').value;
        const limit = document.getElementById('test-limit').value;
        const thresh = document.getElementById('threshold').value;
        const bar = document.getElementById('progress-bar');
        const percentText = document.getElementById('progress-percent');
        const log = document.getElementById('status-log');
        const resultText = document.getElementById('final-accuracy');
        const skippedText = document.getElementById('skipped-info');
        const finishAudio = document.getElementById('finish-sound');
        
        // Очищення інтерфейсу
        log.innerHTML = `<span style="color: #94a3b8;">[SYS] Підключення до ${dataset.toUpperCase()}...</span><br>`;
        log.innerHTML += `<span style="color: #94a3b8;">[SYS] Встановлено ліміт: ${limit}, Поріг: ${thresh}</span><br><br>`;
        bar.style.width = "0%";
        percentText.innerText = "0%";
        resultText.innerText = "";
        skippedText.innerText = "";

        // Ініціалізація SSE
        const eventSource = new EventSource(`/benchmark-stream/?limit=${limit}&threshold=${thresh}&dataset=${dataset}`);

        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            bar.style.width = data.progress + "%";
            percentText.innerText = data.progress + "%";
            
            if (data.status === 'processing') {
                const resClass = data.result === 'TRUE' ? 'res-true' : 'res-false';
                // Вивід ID, дистанції та результату
                log.innerHTML += `> ID: <b>${data.person}</b> | Dist: <i>${data.dist}</i> | <span class="${resClass}">${data.result}</span><br>`;
                log.scrollTop = log.scrollHeight;
            }
            
            if (data.status === 'noisy') {
                log.innerHTML += `> ID: <i>${data.person}</i> | <span class="res-noisy">SKIP (Identity Validation Failed)</span><br>`;
                log.scrollTop = log.scrollHeight;
            }
            
            if (data.status === 'completed') {
                resultText.innerHTML = `Точність: ${data.accuracy}`;
                skippedText.innerText = `Експеримент завершено. Відсіяно ${data.skipped} некоректних пар з вибірки.`;
                log.innerHTML += `<br><b style="color: var(--success-color)">[FINISH] Аналіз завершено успішно. Всі дані збережено.</b>`;
                
                // Звуковий сигнал завершення
                finishAudio.play().catch(e => console.log("Sound blocked by browser"));
                
                eventSource.close();
            }

            if (data.status === 'error') {
                log.innerHTML += `<br><span style="color: var(--error-color)">[ERROR] ${data.message}</span>`;
                eventSource.close();
            }
        };

        eventSource.onerror = function() {
            log.innerHTML += `<br><span style="color: var(--error-color)">[FATAL] Помилка з'єднання з сервером.</span>`;
            eventSource.close();
        };
    }
</script>

</body>
</html>
